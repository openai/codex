name: rusty-v8-release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional Git tag to publish the built artifacts to
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}::${{ github.event.inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-xlarge
            platform: "@rules_rs//rs/experimental/platforms:aarch64-apple-darwin"
            target: aarch64-apple-darwin
          - runner: macos-15-large
            platform: "@rules_rs//rs/experimental/platforms:x86_64-apple-darwin"
            target: x86_64-apple-darwin
          - runner: ubuntu-24.04
            platform: "@rules_rs//rs/experimental/platforms:x86_64-unknown-linux-musl"
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04
            platform: "@rules_rs//rs/experimental/platforms:x86_64-unknown-linux-gnu"
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            platform: "@rules_rs//rs/experimental/platforms:aarch64-unknown-linux-musl"
            target: aarch64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            platform: "@rules_rs//rs/experimental/platforms:aarch64-unknown-linux-gnu"
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-24.04
            platform: "@rules_rs//rs/experimental/platforms:x86_64-pc-windows-gnullvm"
            target: x86_64-pc-windows-gnullvm
          - runner: ubuntu-24.04-arm
            platform: "@rules_rs//rs/experimental/platforms:aarch64-pc-windows-gnullvm"
            target: aarch64-pc-windows-gnullvm

    steps:
      - uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazelbuild/setup-bazelisk@v3

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build Bazel V8 release pair
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail

          target_suffix="${TARGET//-/_}"
          pair_target="//third_party/v8:rusty_v8_release_pair_${target_suffix}"

          bazel_args=(
            build
            "--platforms=${PLATFORM}"
            "${pair_target}"
            --build_metadata=REPO_URL=https://github.com/${GITHUB_REPOSITORY}.git
            --build_metadata=COMMIT_SHA=$(git rev-parse HEAD)
            --build_metadata=ROLE=CI
            --build_metadata=VISIBILITY=PUBLIC
          )

          if [[ -n "${BUILDBUDDY_API_KEY:-}" ]]; then
            bazel \
              --noexperimental_remote_repo_contents_cache \
              --bazelrc=.github/workflows/ci.bazelrc \
              "${bazel_args[@]}" \
              "--remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}"
          else
            bazel \
              --noexperimental_remote_repo_contents_cache \
              "${bazel_args[@]}" \
              --remote_cache= \
              --remote_executor=
          fi

      - name: Stage release pair
        env:
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail

          python3 .github/scripts/rusty_v8_bazel.py stage-release-pair \
            --platform "${PLATFORM}" \
            --target "${TARGET}" \
            --output-dir "dist/${TARGET}"

      - name: Upload release pair
        uses: actions/upload-artifact@v7
        with:
          name: rusty-v8-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  publish-release:
    if: ${{ github.event.inputs.release_tag != '' }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: dist/**
