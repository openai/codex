name: blocking-ci

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  bazel:
    name: Bazel
    uses: ./.github/workflows/bazel.yml
    secrets: inherit

  blob-size-policy:
    name: Blob size policy
    uses: ./.github/workflows/blob-size-policy.yml
    secrets: inherit

  cargo-deny:
    name: cargo-deny
    uses: ./.github/workflows/cargo-deny.yml
    secrets: inherit

  codespell:
    name: Codespell
    uses: ./.github/workflows/codespell.yml
    secrets: inherit

  repo-checks:
    name: repo-checks
    uses: ./.github/workflows/repo-checks.yml
    secrets: inherit

  rust-ci:
    name: rust-ci
    uses: ./.github/workflows/rust-ci.yml
    secrets: inherit

  sdk:
    name: sdk
    uses: ./.github/workflows/sdk.yml
    secrets: inherit

  required:
    name: CI required
    if: ${{ always() }}
    needs:
      - bazel
      - blob-size-policy
      - cargo-deny
      - codespell
      - repo-checks
      - rust-ci
      - sdk
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Require successful dependencies
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: python3 .github/scripts/check_ci_results.py
