[package]
name = "codex-code-mode-host"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "codex-code-mode-host"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
codex-code-mode = { workspace = true }
codex-code-mode-protocol = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["io-std", "io-util", "macros", "process", "rt-multi-thread", "sync", "time"] }
tokio-util = { workspace = true, features = ["rt"] }
# The host owns V8 process configuration, so select the sandboxed V8 build at
# the executable boundary without adding a workspace-crate feature gate.
v8 = { workspace = true, features = ["v8_enable_sandbox"] }

[dev-dependencies]
codex-code-mode-client = { workspace = true }
codex-protocol = { workspace = true }
codex-utils-cargo-bin = { workspace = true }
pretty_assertions = { workspace = true }

[package.metadata.cargo-shear]
# This direct dependency intentionally selects the V8 sandbox feature for the
# host without activating an internal workspace-crate feature.
ignored = ["v8"]
