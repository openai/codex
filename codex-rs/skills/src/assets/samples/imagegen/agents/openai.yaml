interface:
  display_name: "Image Gen"
  short_description: "Generate or edit images for websites, games, and more"
  icon_small: "./assets/imagegen-small.svg"
  icon_large: "./assets/imagegen.png"
  default_prompt: "Generate or edit the visual assets for this task with the built-in `image_gen` tool by default. First confirm that the task actually calls for a raster image; if the project already has SVG/vector/code-native assets and the user wants to extend or match those, do not use this skill. If the task includes reference images, treat them as references unless the user clearly wants an existing image modified. For multi-asset requests, loop built-in calls; the word `batch` alone is not CLI opt-in. For transparent-image requests, still use built-in `image_gen` first by prompting for a flat chroma-key background, then remove that background locally with `python scripts/remove_chroma_key.py --input <source> --out <final.png> --auto-key border --soft-matte --transparent-threshold 12 --opaque-threshold 220 --despill` and save the alpha PNG/WebP. Do not silently downgrade from built-in `image_gen` or CLI `gpt-image-2` to CLI `gpt-image-1.5`. If true/native transparency, a complex transparent subject, or failed chroma-key validation may require `gpt-image-1.5 --background transparent --output-format png`, explain that `gpt-image-2` does not support `background=transparent` and ask the user before proceeding, unless the user already explicitly requested `gpt-image-1.5`, `scripts/image_gen.py`, or CLI fallback. Keep CLI-only controls such as `generate-batch`, `quality`, `input_fidelity`, masks, and output paths on that fallback path."
