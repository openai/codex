interface:
  display_name: "Plugin Creator"
  short_description: "Scaffold plugins and marketplace entries"
  default_prompt: "Use $plugin-creator to scaffold a plugin with placeholder plugin.json, optional structure, and a marketplace.json entry. When the scaffold created or updated a marketplace-backed plugin, end the final response with Markdown deeplinks labeled `View <plugin-name>` and `Share <plugin-name>`."
  icon_small: "./assets/plugin-creator-small.svg"
  icon_large: "./assets/plugin-creator.png"
